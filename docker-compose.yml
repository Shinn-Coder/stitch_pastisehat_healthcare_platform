version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: pastisehat-db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: pastisehat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: 
      context: ./backend
    container_name: pastisehat-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/pastisehat
      - PORT=8000
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  pgdata:
